<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raga Pravagam</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' ry='20' fill='%23FF7518'/><text y='75' x='50' font-size='80' fill='white' font-family='Courier, monospace' font-weight='900' text-anchor='middle'>Ṡ</text></svg>">

 <style>
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #1a1a1a;
            --hover-color: #252525;
            --accent-color: #FF7518;
            --action-color: #e74c3c;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --border-subtle: #2d2d2d;
        }

        html, body { height: 100vh; margin: 0; overflow: hidden; font-family: 'Inter', 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-primary); }
        body { padding: 20px; display: flex; flex-direction: column; align-items: center; box-sizing: border-box; }

		header { 
			display: flex; 
			justify-content: space-between; 
			align-items: center;
			width: 100%; 
			max-width: 1500px; 
			margin-bottom: 20px; 
			border-bottom: 1px solid var(--border-subtle); 
			padding-bottom: 15px; 
			flex-shrink: 0;
		}

		h1 { 
			margin: 0; 
			font-size: 1.8rem; 
			font-weight: 800; 
			text-transform: uppercase; 
			letter-spacing: 1px; 
			user-select: none; 
			display: flex; /* Ensures title and count align perfectly */
			align-items: center;
		}

        .filter-section { width: 100%; max-width: 1500px; margin-bottom: 25px; flex-shrink: 0; }
        .button-row { display: flex; width: 100%; gap: 6px; align-items: center; }

        .letter-btn {
            background: #222; border: 1px solid var(--border-subtle); color: var(--text-secondary);
            padding: 10px 0; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.75rem; transition: 0.2s; flex: 1; text-align: center;
			user-select: none;           /* Prevents the highlight */
			-webkit-user-select: none;   /* Safari support */
	}
        .letter-btn:hover { border-color: var(--accent-color); color: var(--accent-color); }
        .letter-btn.active { background: var(--accent-color); color: white; border-color: var(--accent-color); opacity: 1 !important; }
        .letter-btn.active:hover { background-color: #bf360c !important; border-color: #bf360c !important;}
        
        .exclusive-active .letter-btn:not(.active):not(.reset-btn-style) { opacity: 0.5; color: #b0b0b0; }

        .reset-btn-style { background: #1a1111; border-color: #442222; color: #cc6666; flex: 1.5; }
        .reset-btn-style:hover { background: var(--action-color) !important; color: white !important; border-color: var(--action-color) !important; }
        .reset-btn-style:active { animation: button-pop 0.15s ease-out; background: #ff0000 !important; box-shadow: 0 0 20px rgba(231, 76, 60, 0.6); }

        @keyframes button-pop { 0% { transform: scale(1); } 50% { transform: scale(0.92); } 100% { transform: scale(1); } }

        .toggle-container { display: flex; align-items: center; gap: 8px; padding-left: 10px; border-left: 1px solid var(--border-subtle); margin-left: 5px; }
        .switch-label { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-secondary); white-space: nowrap; }
        .switch { position: relative; display: inline-block; width: 38px; height: 20px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #222; border: 1px solid #444; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: var(--text-secondary); transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent-color); border-color: var(--accent-color); }
        input:checked + .slider:before { transform: translateX(18px); background-color: white; }

		.view-container { 
			width: 100%; 
			max-width: 1500px; 
			flex: 1; 
			display: flex; 
			gap: 20px; 
			min-height: 0; /* CRITICAL: allows children to be smaller than content */
			overflow: hidden; 
		}

		#sidebar {
			flex: 0 0 280px;
			background: var(--surface-color);
			border: 1px solid var(--border-subtle); /* Standard 1px */
			border-radius: 12px;
			display: flex;
			flex-direction: column;
			overflow: hidden;
		}
		#sidebar-header { 
			padding: 15px; 
			font-size: 0.75rem; 
			font-weight: 800; 
			color: var(--accent-color); 
			text-transform: uppercase; 
			letter-spacing: 1px; 
			border-bottom: 1px solid var(--border-subtle); 
			background: #151515; 
			flex-shrink: 0;
			user-select: none;
			-webkit-user-select: none;
			cursor: default;
		}
		
		

		#content {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 0;
			background: var(--surface-color);
			border: 1px solid var(--border-subtle); /* This is your main frame */
			border-radius: 12px;
			overflow: hidden; /* This clips the internal children to the curves */
		}

        #mk-list { flex: 1; overflow-y: auto; }

		.mk-item { 
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 12px 15px; 
			cursor: pointer; 
			border-bottom: 1px solid #222; 
			font-size: 0.85rem; 
			color: var(--text-secondary); 
			text-transform: uppercase;
			font-weight: 700; 
			transition: all 0.2s ease;
			user-select: none;
			-webkit-user-select: none;
		}   

		.mk-item:hover {
			background: var(--hover-color);
			color: var(--text-primary);
			padding-left: 20px;
			/* Adds the orange outline effect */
			outline: 1px solid var(--accent-color);
			outline-offset: -1px; /* Keeps the outline inside the box to prevent layout shifting */
			box-shadow: 0 0 8px rgba(255, 117, 24, 0.3); /* Adds a subtle glow like the swarams */
		}

		.mk-item.active { 
			background: #222; 
			color: var(--accent-color); 
			font-weight: 800; 
			/* Use an inset box-shadow instead of a border to prevent shifting */
			box-shadow: inset 4px 0 0 var(--accent-color); 
		}

				@keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

		table {
			width: 100%;
			border-collapse: collapse;
			border-spacing: 0;
			border: none !important;
			table-layout: fixed;
			user-select: none;
			-webkit-user-select: none;
			cursor: default;
		}

		thead th { 
			position: sticky; 
			top: 0; 
			z-index: 20; 
			background: var(--surface-color); 
			color: var(--accent-color); 
			padding: 14px 15px; 
			text-align: left; 
			font-size: 0.75rem; 
			font-weight: 800; 
			text-transform: uppercase; 
			/* This creates a permanent line that stays during scroll */
			box-shadow: inset 0 -1px 0 var(--border-subtle); 
			border: none;
		}

		/* Removes the top border from the first row so it doesn't touch the header divider */
		#janya-list tr:first-child td {
			border-top: none !important;
		}

		td {  
			padding: 12px 15px;  
			border-bottom: 1px solid var(--border-subtle); 
			vertical-align: middle;
			overflow: hidden;
			white-space: nowrap; /* CRITICAL: Prevents wrapping to second line */
			text-overflow: clip; 
		}

				tr:hover td { background-color: var(--hover-color); }

		th:nth-child(1), td:nth-child(1) { width: 50px; text-align: center; } 
		th:nth-child(2), td:nth-child(2) { width: 22%; text-align: left; }
		th:nth-child(3), td:nth-child(3) { width: 36%; text-align: left; }
		th:nth-child(4), td:nth-child(4) { width: 36%; text-align: left; }

		.raga-name { 
			font-weight: 700; 
			color: var(--text-primary); 
			text-transform: lowercase; 
			/* Fluid font: Min 0.7rem, Scalable 1.1vw, Max 0.95rem */
			font-size: clamp(0.7rem, 1.1vw, 0.95rem); 
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.scale-box { 
			font-family: 'Consolas', monospace; 
			color: var(--text-secondary); 
			letter-spacing: -0.5px; /* Tighter tracking to fit more swaras */
			/* Fluid font: Min 0.65rem, Scalable 1.2vw, Max 1rem */
			font-size: clamp(0.65rem, 1.2vw, 1rem); 
		}

		/* Remove the small-scale class as clamp handles it now */
		.scale-box.small-scale {
			font-size: clamp(0.6rem, 1.1vw, 0.9rem);
		}

				.highlight { color: var(--accent-color); font-weight: bold; }

		.play-all-btn { 
			display: inline-flex; 
			align-items: center; 
			justify-content: center; 
			width: 26px;
			height: 26px; 
			border-radius: 50%; 
			background: transparent; 
			border: 1px solid var(--accent-color); 
			color: var(--accent-color); 
			cursor: pointer; 
			padding: 0;
			transition: all 0.15s ease-in-out;
			outline: none;
		}
				
				.play-all-btn svg {
					width: 18px;   /* Increased from 10px */
					height: 18px;
					transition: transform 0.2s ease;
				}
				
		.play-all-btn:hover {
			background: var(--accent-color); /* Fills the circle */
			color: var(--bg-color);          /* Icon turns dark for contrast */
		}
				
		.play-all-btn.playing { 
			background: var(--accent-color) !important; 
			color: white !important; 
			border-color: white !important;
		}


				::-webkit-scrollbar { width: 6px; }
				::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
				::-webkit-scrollbar-thumb:hover { background: var(--accent-color); }
				
		.mela-count {
			font-size: 0.8rem;         /* Slightly larger for readability */
			font-weight: 600;       /* Extra bold as requested */
			color: var(--accent-color);
			margin-left: 15px;      /* Creates space between name and count */
			flex-shrink: 0;         /* Prevents the count from being squished */
		}

		#content {
			flex: 1;
			display: flex;
			flex-direction: column;
			min-height: 0; /* CRITICAL: allows table-wrapper to scroll */
		}

		#table-wrapper {
			flex: 1;
			overflow-y: auto;
			background: transparent; /* Let the parent color show through */
			border: none !important;  /* Strip the double border */
			border-radius: 0;
		}

		.scale-box { 
			font-family: 'Consolas', monospace; 
			font-size: 0.95rem; /* Slightly smaller base font */
			color: var(--text-secondary); 
			letter-spacing: 0.5px; 
		}

		/* New class for long complex scales */
		.scale-box.small-scale {
			font-size: 0.82rem;
			letter-spacing: 0;
		}

		/* Allow raga names to wrap so they don't push the table wider */
		.raga-name { 
			font-weight: 700; 
			color: var(--text-primary); 
			text-transform: lowercase; 
			white-space: normal; /* Allows wrapping */
			line-height: 1.2;
			max-width: 200px; /* Constraints the name column */
		}

		/* Ensure table cells handle overflow gracefully */
		td { 
			padding: 12px 15px; 
			border-bottom: 1px solid #252525; 
			font-size: 0.95rem; 
			vertical-align: middle;
			overflow: hidden;
		}

		sub {  
			font-size: 0.6em; /* Using 'em' instead of 'rem' makes it scale with the parent font */
			color: var(--accent-color);  
			font-weight: 800;  
			margin-left: 0.5px;
			vertical-align: sub;
		}

		/* Ensure the highlight class (for filters) doesn't conflict */
		.highlight { 
			color: var(--accent-color) !important; 
			font-weight: 900; 
		}

		.header-total {
			font-size: 0.85rem;
			color: var(--text-secondary);
			font-weight: 600;
			margin-right: 15px;
			white-space: nowrap;
			display: inline-block;
			min-width: 140px; 
			text-align: right;
			user-select: none;
			-webkit-user-select: none;
		}

		.title-text {
			color: var(--accent-color);
			transition: all 0.3s ease;
		}

		.title-text:hover { 
			color: #ff9d5c; 
			text-shadow: 0 0 15px var(--accent-color); 
		}

		.title-text:active { 
			transform: scale(0.98); 
		}

		header { justify-content: space-between; } /* Ensure title and search are separated */

		.search-area {
			display: flex;
			align-items: center;
		}

		.search-area input {
			background: #ffffff;
			border: 1px solid var(--accent-color);
			color: #000000;
			padding: 7px 12px;
			padding-right: 30px !important; /* Space for the 'X' button */
			border-radius: 6px;
			width: 220px;
			font-weight: 500;
			outline: none;
			transition: border-color 0.2s;
			line-height: 1.2; /* Normalizes height across browsers */
		}

		.search-area input:focus {
			border-color: var(--accent-color);
		}

		.search-area input::placeholder {
			color: #000000;
			opacity: 1;
		}

		.search-area input {
			padding-right: 30px !important;
		}

		#clearSearch:hover {
			color: var(--accent-color) !important;
		}

		.swara-filter-num {
			color: var(--accent-color) !important; /* Forces the orange */
			font-size: 0.60rem; /* Smaller than the letter */
			font-weight: 800;
			position: relative;
			top: 0.4em; /* Manually pushes it down to subscript position */
			margin-left: 1px;
			line-height: 0; /* Prevents the subscript from increasing the button height */
		}

		.letter-btn {
			display: inline-flex;
			align-items: center;
			justify-content: center;
			vertical-align: middle;
		}

		/* This targets the subscript ONLY when the button is in the active state */
		.letter-btn.active .swara-filter-num {
			color: inherit !important; /* Forces the number to match the button text color */
			opacity: 1;
		}

		/* Ensure the number is orange by default when NOT active */
		.swara-filter-num {
			color: var(--accent-color);
			font-size: 0.55rem;
			font-weight: 800;
			position: relative;
			top: 0.4em;
			margin-left: 1px;
			line-height: 0;
		}

		/* Sidebar Toggle Area */
		.toggle-group {
			padding: 0 12px;
			height: 44px; /* Fixed height for alignment */
			background: #151515;
			border-bottom: 1px solid var(--border-subtle);
			display: flex;
			flex-direction: row;
			align-items: center;
			gap: 12px;
			box-sizing: border-box;
		}

		.table-controls {
			background: #151515;
			height: 44px;
			display: flex;
			align-items: center;
			padding: 0 12px;
			border-bottom: 1px solid var(--border-subtle); /* Separates buttons from table */
			border-top: none;
			border-left: none;
			border-right: none;
			box-sizing: border-box;
		}

		/* Polished Hardware Toggles */
		.toggle-item {
			display: flex;
			align-items: center;
			gap: 6px;
			cursor: pointer;
		}

		.toggle-item .switch {
			width: 28px;
			height: 14px;
			flex-shrink: 0;
		}

		.toggle-item .slider:before {
			height: 10px;
			width: 10px;
			left: 2px;
			bottom: 2px;
			background-color: #555;
		}

		input:checked + .slider:before {
			transform: translateX(14px);
			background-color: white;
		}

		.toggle-item .switch-label {
			font-size: 0.6rem;
			font-weight: 800;
			color: var(--text-secondary);
			letter-spacing: 0.5px;
			text-transform: uppercase;
		}

		/* Sub-toggle logic styling - restriction removed to allow independent use */
		.sub-toggle-disabled {
			opacity: 1;
			pointer-events: auto;
		}


		/* Swaram buttons layout */
		.button-row {
			display: flex;
			gap: 5px;
			width: 100%;
		}

		.letter-btn {
			padding: 6px 0;
			font-size: 0.7rem;
			flex: 1;
		}

		.mode-btn {
			background: #222;
			border-color: white;
			flex: 1.5;
		}

		.mode-btn.active {
			background: var(--accent-color) !important;
			border-color: var(--accent-color) !important;
			color: white !important;
		}

		.mk-item.active.empty-mela {
			color: #ff4444; /* Red color */
			box-shadow: inset 4px 0 0 #ff4444;
		}

		.mk-item.empty-mela .mela-count {
			color: #ff4444;
		}
		
		/* Medium Forest Green - Permanent Theme */
		.exact-btn-style { 
			background: #142214; 
			border-color: #2a442a; 
			color: #5cb85c; 
			flex: 1.5; 
		}

		/* Hovering when the button is OFF */
		.exact-btn-style:hover { 
			background: #2a5c2a !important; 
			color: white !important; 
			border-color: #3e8e3e !important; 
		}

		/* Toggled ON state */
		.exact-btn-style.active { 
			background: #3e8e3e !important; 
			color: white !important; 
			border-color: #3e8e3e !important;
			box-shadow: none !important;
		}

		.exact-btn-style.active:hover {
			background: #2d5a2d !important; /* A deeper, more "pressed" forest green */
			border-color: #244824 !important;
			color: #e0e0e0 !important; /* Slightly dims the text */
		}

		.exact-btn-style:active { 
			animation: button-pop 0.15s ease-out; 
			transform: scale(0.96);
			box-shadow: none !important;
		}
		
		.exact-btn-style, 
		.reset-btn-style {
			flex: 0 1 100px !important; /* Limits growth, but allows shrinking */
			min-width: 65px;            /* Keeps them from getting too small */
			text-align: center;
			display: inline-flex;
			align-items: center;
			justify-content: center;
			white-space: nowrap;
		}

		/* Ensure the swara buttons are smaller than the functional buttons */
		.letter-btn:not(.exact-btn-style):not(.reset-btn-style) {
			flex: 1; 
}
		
    </style>
</head>
<body>

<header>
    <h1>
       <span class="title-text" onclick="location.reload()" style="cursor: pointer;">Raga Pravagam</span>
        </h1>

    <div class="search-area" id="searchArea">
        <span id="total-display-count" class="header-total">0 of 5,530 raagas displayed </span>
        <span id="resultCount" style="font-size: 0.75rem; color: var(--text-secondary); margin-right: 10px;"></span>
        <div style="position: relative; display: flex; align-items: center;">
            <input type="text" id="searchInput" oninput="updateDisplay()" placeholder="Search raagam...">
            <span id="clearSearch" onclick="clearSearch()" style="position: absolute; right: 10px; color: #666; cursor: pointer; display: none; font-weight: bold; font-size: 1.1rem; user-select: none;">&times;</span>
        </div>
    </div>
</header>

<div class="view-container">
<div id="sidebar">
    <div class="table-controls" style="border-bottom: 1px solid var(--border-subtle);">
        <div class="button-row" id="mode-container"></div>
    </div>
		<div id="sidebar-header">MELAKARTAS</div>
		<div id="mk-list"></div>
</div>
    
    <div id="content">
        <div class="table-controls">
            <div class="button-row" id="filter-container"></div>
        </div>

        <div id="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>Raagam</th>
                        <th>Arohanam</th>
                        <th>Avarohanam</th>
                    </tr>
                </thead>
                <tbody id="janya-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- STATE ---
	let ragas = [], uniqueMela = [], activeFilters = [], activeMKs = [], isExclusive = false;
    
    window.isSymmetryRequired = false;
    
    window.showChakra = false;
	
	window.showSource = false;
	
	window.vakraState = 0; // 0: OFF, 1: VAKRAM, 2: NON-VAKRAM
    
    // Audio State
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
	const swaraFreqs = { 
		// --- EXISTING MIDDLE OCTAVE ---
		"S": 261.63, "R1": 277.18, "R2": 293.66, "R3": 311.13, 
		"G1": 293.66, "G2": 311.13, "G3": 329.63, 
		"M1": 349.23, "M2": 369.99, "P": 392.00, 
		"D1": 415.30, "D2": 440.00, "D3": 466.16, 
		"N1": 440.00, "N2": 466.16, "N3": 493.88, "Ṡ": 523.25,

		// --- LOWER OCTAVE (Dot Below) ---
		"Ṃ1": 174.61, // M1 / 2
		"Ṃ2": 185.00, // M2 / 2
		"P̣": 196.00,  // P / 2
		"Ḍ1": 207.65, // D1 / 2
		"Ḍ2": 220.00, // D2 / 2
		"Ḍ3": 233.08, // D3 / 2
		"Ṇ1": 220.00, // N1 / 2
		"Ṇ2": 233.08, // N2 / 2
		"Ṇ3": 246.94, // N3 / 2

		// --- HIGHER OCTAVE (Dot Above) ---
		"Ṙ1": 554.37, // R1 * 2
		"Ṙ2": 587.33, // R2 * 2
		"Ṙ3": 622.25, // R3 * 2
		"Ġ1": 587.33, // G1 * 2
		"Ġ2": 622.25, // G2 * 2
		"Ġ3": 659.26, // G3 * 2
		"Ṁ1": 698.46, // M1 * 2
		"Ṁ2": 739.98, // M2 * 2
		"Ṗ": 784.00   // P * 2
	};
  
    let activeTimers = [], activeGainNodes = [], currentGeneration = 0, droneGain = null;

    // Icons
    const playIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>`;
    const stopIcon = `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12"/></svg>`;
    
	const getBaseSwara = (s) => s.replace(/[\u0323\u1E60\u1E58\u1E20\u1E42\u1E40\u1E56\u1E0C\u1E46ṠṘĠṂṀṖḌṆ]/g, (m) => {
    const mapping = { 
        'Ṡ':'S', 'Ṙ':'R', 'Ġ':'G', 'Ṃ':'M', 'Ṁ':'M', 'Ṗ':'P', 
        'Ḍ':'D', 'Ṇ':'N', 'P̣':'P' // Add any others as needed
    };
    return mapping[m] || m;
}).replace(/\u0323/g, ''); // Ensure combining dots are gone

function updateDisplay() {
    const tableBody = document.getElementById('janya-list');
    const searchInput = document.getElementById('searchInput');
    const searchTerm = searchInput ? searchInput.value.toLowerCase().trim() : "";
    
    if (!tableBody) return;
    tableBody.innerHTML = "";

    const clearBtn = document.getElementById('clearSearch');
    if (clearBtn) clearBtn.style.display = searchTerm ? "block" : "none";

    // 1. Filter the Master List based on Search, Swaras, and Symmetry
    let globallyFiltered = ragas;
    
	if (searchTerm) {


const phonetize = (str) => {
    if (!str) return "";
    return str.toLowerCase()
        // 1. Structural: Remove spaces and handle Y-glides
        .replace(/\s+/g, '')
        .replace(/([aeiou])y([aeiou])/g, '$1$2') // priya -> pria
        
        // 2. Vowel Length Flattening (Do this BEFORE bucketing)
        // This handles Saavaeri -> Saveri
        .replace(/aa/g, 'a')
        .replace(/ee/g, 'i')
        .replace(/oo/g, 'u')
        .replace(/ii/g, 'i')
        .replace(/uu/g, 'u')

        // 3. Specific Suffixes
        .replace(/ee$/g, 'i')
        .replace(/ai$/g, 'a')

        // 4. Diphthongs
        .replace(/(au|ow|oa|ou)/g, 'u')

        // 5. Consonant Family Unification (Aspiration + Voicing)
        .replace(/(kh|gh|g)/g, 'k')  // Velars
        .replace(/(ch|jh|j)/g, 'c')  // Palatals
        .replace(/(th|dh|d)/g, 't')  // Dentals (suddha/sudha/kuththa)
        .replace(/(ph|bh|b|v)/g, 'p') // Labials (Handles Saveri/Saberi)
        .replace(/sh/g, 's')         // Sibilants

        // 6. CRITICAL CLEANUP: Remove 'h' and collapse duplicates
        // This handles sudhdha -> suttta -> suta
        .replace(/h/g, '')
        .replace(/(.)\1+/g, '$1') 

        // 7. The Vowel Bucket (A, U, I, Y Unification)
        // Everything becomes a neutral 'a' for the final match
        .replace(/[uiy]/g, 'a')
        
        // 8. Final Collapse 
        // Handles cases where Step 7 created new doubles (e.g., 'ia' -> 'aa' -> 'a')
        .replace(/(.)\1+/g, '$1');
};

		const cleanSearch = phonetize(searchTerm);

		const fuzzyPattern = cleanSearch.split('').map(char => 
			char.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
		).join('.*');
		const regex = new RegExp(fuzzyPattern);
		
		globallyFiltered = globallyFiltered.filter(r => {
			const cleanName = phonetize(r.name);
			return regex.test(cleanName);
		});
}

globallyFiltered = globallyFiltered.filter(r => {
    // PRE-PROCESS: Extract swaras for structural analysis
    const noteRegex = /[SRGMPDNṠṆḌṘĠṂṀṖ]\u0323?\d?/g;
    const aroNotes = r.aro.match(noteRegex) || [];
    const avaNotes = r.ava.match(noteRegex) || [];

    // 1. Swara Filtering (Octave Agnostic)
    if (activeFilters.length > 0) {
        const baseActive = activeFilters.map(f => getBaseSwara(f));
        const ragaBaseNotes = r.notes.map(n => getBaseSwara(n));
        const uniqueRagaBases = [...new Set(ragaBaseNotes)];

        if (isExclusive) {
            if (uniqueRagaBases.length !== baseActive.length || 
                !uniqueRagaBases.every(b => baseActive.includes(b))) return false;
        } else {
            if (!baseActive.every(b => ragaBaseNotes.includes(b))) return false;
        }
    }

    // 2. Symmetry Check (ARO = AVA) - Moved back to its own logic
    if (window.isSymmetryRequired) {
        if (aroNotes.length !== avaNotes.length) return false;
        const avaReversed = [...avaNotes].reverse();
        const isStrictMirror = aroNotes.every((note, index) => note === avaReversed[index]);
        if (!isStrictMirror) return false;
    }

	// 3. Vakra Check (3-Way Toggle)
		const isRagaVakra = isVakra(aroNotes, avaNotes);
		
		// Mode 1: VAKRAM ONLY (Green)
		if (window.vakraState === 1 && !isRagaVakra) {
			return false; 
		} 
		
		// Mode 2: STRAIGHT/NON-VAKRAM ONLY (Red)
		if (window.vakraState === 2 && isRagaVakra) {
			return false; 
		}
		
		// Mode 0: OFF - All ragas pass through
		return true;
	});
        
// 2. Update Sidebar Items
    const sidebarItems = document.querySelectorAll('.mk-item');
    sidebarItems.forEach(item => {
        const melaText = item.getAttribute('data-mela');
        const melaCount = globallyFiltered.filter(r => r.mela.toUpperCase() === melaText).length;
        
        item.innerHTML = `<span>${melaText}</span><span class="mela-count">(${melaCount})</span>`;
        
        // Add or remove the 'empty-mela' class based on count
        if (melaCount === 0) {
            item.classList.add('empty-mela');
        } else {
            item.classList.remove('empty-mela');
        }

        // VISIBILITY LOGIC:
        // Always show the item if it is the activeMK (even if count is 0)
		if (activeMKs.includes(melaText)) {
				// If it's one of our selected MKs, always show it
				item.style.display = "flex";
			} 
			else if (isExclusive && activeFilters.length === 0) {
				// Exact match mode with no swaras = hide others
				item.style.display = "none"; 
			} else if (activeFilters.length > 0 || searchTerm.length > 0) {
				// If searching/filtering, hide if count is 0
				item.style.display = (melaCount === 0) ? "none" : "flex"; 
			} else {
				// Default state
				item.style.display = "flex"; 
			}
    });
    
	// --- 3. Determine Table List ---
	let tableDisplayList = [];
	const isFiltering = activeFilters.length > 0 || searchTerm.length > 0;

	if (activeMKs.length > 0) {
		// Show ragas that belong to ANY of the selected Melakartas
		tableDisplayList = globallyFiltered.filter(r => activeMKs.includes(r.mela.toUpperCase()));
	} else if (isFiltering) {
		tableDisplayList = globallyFiltered;
	} else {
		tableDisplayList = []; 
	}

	// --- 4. Sorting Logic (MKs First by Num, then Janyas A-Z) ---
		tableDisplayList.sort((a, b) => {
			// 1. Identify Parents
			const cleanNameA = a.name.trim().toUpperCase();
			const cleanNameB = b.name.trim().toUpperCase();
			const cleanMelaA = a.mela.replace(/^[\d\s.-]+/, '').trim().toUpperCase();
			const cleanMelaB = b.mela.replace(/^[\d\s.-]+/, '').trim().toUpperCase();
			
			const isParentA = cleanNameA === cleanMelaA;
			const isParentB = cleanNameB === cleanMelaB;

			// RULE 1: If one is a Parent and the other isn't, Parent always wins (moves to top)
			if (isParentA && !isParentB) return -1;
			if (!isParentA && isParentB) return 1;

			// RULE 2: If BOTH are Parents, sort them by Melakarta Number
			if (isParentA && isParentB) {
				const numA = parseInt(a.mela.match(/^\d+/) || 0);
				const numB = parseInt(b.mela.match(/^\d+/) || 0);
				return numA - numB;
			}

			// RULE 3: If BOTH are Janyas, sort them alphabetically by name
			return cleanNameA.localeCompare(cleanNameB);
		});	
		
		// --- 5. Determine if we show the superscript ---
		const showMelaNumber = activeFilters.length > 0 || searchTerm.length > 0 || activeMKs.length > 1;			
		
		tableBody.innerHTML = ""; 
			
		tableDisplayList.forEach(r => {
			const cleanMela = r.mela.replace(/^[\d\s.-]+/, '').trim().toUpperCase();
			const isParent = r.name.trim().toUpperCase() === cleanMela;
			renderRow(r, tableBody, isParent, showMelaNumber);
		});
		
		// 6. Update the header count (MOVE THIS OUTSIDE THE LOOP)
		const totalCountSpan = document.getElementById('total-display-count');
		if (totalCountSpan) {
		totalCountSpan.innerText = `${tableDisplayList.length.toLocaleString()} of ${ragas.length.toLocaleString()} raagas displayed`;
    }
}

function renderRow(r, container, isParent, showMelaNumber) {

function loadData() {
    if (typeof rawData === 'undefined') return;
    ragas = rawData.split('\n').filter(l => l.includes('\t')).map(l => {
        // Order: CHAKRA, MELAKARTA, RAGA, AROHANAM, AVAROHANAM, SOURCE
        const [c, m, n, ar, av, s] = l.split('\t'); 
        
        return { 
            // Strips "01 - " and makes uppercase
            chakra: (c && c.length > 5) ? c.slice(5).trim().toUpperCase() : (c ? c.trim().toUpperCase() : ""),
            mela: m ? m.trim().toUpperCase() : "", 
            name: n ? n.trim() : "", 
            aro: ar ? ar.trim() : "", 
            ava: av ? av.trim() : "", 
            source: s ? s.trim().toUpperCase() : "",
            notes: (ar + av).match(/[SRGMPDNṠṆḌṘĠṂṀṖ]\u0323?\d?/g) || []
        };
    });
    
    uniqueMela = [...new Set(ragas.map(r => r.mela))].filter(Boolean);
    initFilters();
    
    const list = document.getElementById('mk-list');
    list.innerHTML = ""; 
    uniqueMela.forEach(m => {
        const d = document.createElement('div'); 
        d.className = 'mk-item'; 
        d.setAttribute('data-mela', m);
        const initialCount = ragas.filter(r => r.mela === m).length;
        d.innerHTML = `<span>${m}</span><span class="mela-count">(${initialCount})</span>`;
        d.onclick = () => { 
            const index = activeMKs.indexOf(m);
            if (index > -1) {
                activeMKs.splice(index, 1);
                d.classList.remove('active');
            } else {
                activeMKs.push(m);
                d.classList.add('active'); 
            }
            updateDisplay(); 
        };
        list.appendChild(d);
    });
}

    // --- AUDIO ---
function stopAllPlayback() {
        currentGeneration++;
        activeTimers.forEach(t => clearTimeout(t));
        activeTimers = [];
        
        document.querySelectorAll('.play-all-btn').forEach(b => {
            b.innerHTML = playIcon;
            b.classList.remove('playing');
        });

        const now = audioCtx.currentTime;
        if (droneGain) {
            droneGain.gain.cancelScheduledValues(now);
            droneGain.gain.setValueAtTime(droneGain.gain.value, now);
            droneGain.gain.linearRampToValueAtTime(0, now + 1.0);
        }

        activeGainNodes.forEach(g => {
            try {
                g.gain.cancelScheduledValues(now);
                g.gain.setValueAtTime(g.gain.value, now);
                g.gain.exponentialRampToValueAtTime(0.0001, now + 0.05);
            } catch(e){}
        });
        activeGainNodes = [];
    }

function startDrone() {
        const master = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, audioCtx.currentTime);

        [0, 2].forEach(d => {
            const o = audioCtx.createOscillator();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(130.81, audioCtx.currentTime);
            o.detune.setValueAtTime(d, audioCtx.currentTime);
            o.connect(filter);
            o.start();
        });

        filter.connect(master);
        master.connect(audioCtx.destination);
        master.gain.setValueAtTime(0, audioCtx.currentTime);
        master.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 0.2);
        droneGain = master;
    }

function playFullRaagam(aroStr, avaStr, btn) {
        if (btn.classList.contains('playing')) { stopAllPlayback(); return; }
        stopAllPlayback();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        btn.innerHTML = stopIcon;
        btn.classList.add('playing');
        startDrone();

        const myGen = currentGeneration;
		const getNotes = (s) => s.match(/[SRGMPDNṠṆḌṘĠṂṀṖ]\u0323?\d?/g) || [];
        const aroN = getNotes(aroStr), avaN = getNotes(avaStr);
        let delay = 1000;

        const schedule = (swara, isLast, isAva) => {
		const t = setTimeout(() => {
			if (myGen !== currentGeneration) return;
			const duration = isLast ? 1.0 : 0.48;
			const gain = playNote(swara, duration, isLast);
			if (gain) activeGainNodes.push(gain);

			if (isAva && isLast) {
				setTimeout(() => {
					if (myGen === currentGeneration) stopAllPlayback();
				}, 2000);
			}
		}, delay);
		activeTimers.push(t);
	};

        aroN.forEach((s, i) => {
            const isL = i === aroN.length - 1;
            schedule(s, isL, false);
            delay += 480;
            if (isL) delay += 1200;
        });

        avaN.forEach((s, i) => {
            const isL = i === avaN.length - 1;
            schedule(s, isL, true);
            delay += 480;
        });
    }

function playNote(swara, duration, isFinalNote) {
	
	const freq = swaraFreqs[swara] || swaraFreqs[swara.toUpperCase()];
    
		if (!freq) {
			console.warn(`Frequency not found for: ${swara}`);
			return null;
		}

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(1800, audioCtx.currentTime);

        const start = audioCtx.currentTime + 0.02;
        const end = start + duration;
        const release = isFinalNote ? 1.2 : 0.2;

        gain.gain.setValueAtTime(0, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.18, start + 0.1);
        gain.gain.setValueAtTime(0.18, end);
        gain.gain.linearRampToValueAtTime(0, end + release);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(start);
        osc.stop(end + release + 0.1);
        return gain;
    }

    // --- HELPERS ---
function formatScale(s) {
    // 1. Updated patternStr to include the new dotted characters
    // We include ṘĠṂṀṖ (dots above) and P̣ḌṆ (dots below) + your existing Ṡ (\u1E60)
    const patternStr = '([SRGMPDNṠṆḌṘĠṂṀPṖ]\\u0323?)(\\d?)';
    const swaraRegExp = new RegExp(patternStr, 'g');
    
    return s.replace(swaraRegExp, (match, swara, num) => { 
        // 2. Check if the swara + number exists in our active filters
        const swaraKey = swara + num;
		const isHighlighted = activeFilters.some(f => getBaseSwara(f) === getBaseSwara(swaraKey));
		const highlightClass = isHighlighted ? 'highlight' : '';
        const subscript = num ? `<sub>${num}</sub>` : '';
        
        // 3. Return the formatted HTML string

function isVakra(aroNotes, avaNotes) {
    // Arohanam: Must strictly increase in frequency
    for (let i = 1; i < aroNotes.length; i++) {
        const currentFreq = swaraFreqs[aroNotes[i]];
        const prevFreq = swaraFreqs[aroNotes[i-1]];
        if (currentFreq && prevFreq && currentFreq < prevFreq) return true;
    }
    // Avarohanam: Must strictly decrease in frequency
    for (let i = 1; i < avaNotes.length; i++) {
        const currentFreq = swaraFreqs[avaNotes[i]];
        const prevFreq = swaraFreqs[avaNotes[i-1]];
        if (currentFreq && prevFreq && currentFreq > prevFreq) return true;
    }
    return false;
}
